version: "3.9"

services:
  hiresense:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hiresense-app
    ports:
      - "8080:8080"
    environment:
      HIRESENSE_APP_NAME: HireSense
      HIRESENSE_DB_URL: jdbc:mysql://mysql:3306/hiresense_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      HIRESENSE_DB_USERNAME: hiresense
      HIRESENSE_DB_PASSWORD: hiresense123
      HIRESENSE_MAIL_USERNAME: ${HIRESENSE_MAIL_USERNAME}
      HIRESENSE_MAIL_PASSWORD: ${HIRESENSE_MAIL_PASSWORD}
    depends_on:
      - mysql
    restart: unless-stopped

  mysql:
    image: mysql:8.4
    container_name: hiresense-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: hiresense_db
      MYSQL_USER: hiresense
      MYSQL_PASSWORD: hiresense123
      MYSQL_ROOT_PASSWORD: root123
    command: ["--default-authentication-plugin=mysql_native_password"]
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped

volumes:
  mysql_data:
